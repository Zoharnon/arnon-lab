<header class="site-header">

  <div class="wrapper">

    <a class="site-title" href="{{ site.baseurl }}/">
      {{ site.lab_name }}
      {% if site.institution %}
        <span class="title-institution">{{ site.institution | prepend: "  @  " }}</span>
      {% endif %}
    </a>

  </div>

  <div class="wrapper main-menu">

    <nav class="site-nav">
      <a href="#" class="menu-icon" id="nav-toggle" aria-label="Toggle navigation">
        <svg viewBox="0 0 18 15">
          <path fill="#a0c4e0" d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.031C17.335,0,18,0.665,18,1.484L18,1.484z"/>
          <path fill="#a0c4e0" d="M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0c0-0.82,0.665-1.484,1.484-1.484 h15.031C17.335,6.031,18,6.696,18,7.516L18,7.516z"/>
          <path fill="#a0c4e0" d="M18,13.516C18,14.335,17.335,15,16.516,15H1.484C0.665,15,0,14.335,0,13.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.031C17.335,12.031,18,12.696,18,13.516L18,13.516z"/>
        </svg>
      </a>

      <div class="trigger">
        <ul>
          {% assign pages = site.pages | sort: "rank" %}
          {% for p in pages %}
            {% if p.title and p.toggle %}
            <li><a class="page-link" href="{{ p.url | prepend: site.baseurl }}">
                {{ p.title }}
            </a></li>
            {% endif %}
          {% endfor %}
        </ul>
        <div style="clear:both;"></div>
      </div>
    </nav>

  </div>

</header>

<script>
document.getElementById('nav-toggle').addEventListener('click', function(e) {
  e.preventDefault();
  this.closest('.site-nav').classList.toggle('open');
});
</script>

<!-- Floating "We're Hiring" banner -->
<div id="hiring-banner" style="
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 8px;
  background: #1a2e44;
  border: 1px solid #35b779;
  border-radius: 999px;
  padding: 8px 16px 8px 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  font-family: inherit;
  font-size: 0.85rem;
  color: #e0f4ec;
  text-decoration: none;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s;
" onmouseover="this.style.boxShadow='0 6px 22px rgba(53,183,121,0.35)'; this.style.transform='translateY(-2px)'"
   onmouseout="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.25)'; this.style.transform='translateY(0)'">
  <span style="
    width: 8px; height: 8px;
    background: #35b779;
    border-radius: 50%;
    display: inline-block;
    animation: hiring-pulse 2s infinite;
    flex-shrink: 0;
  "></span>
  <a href="mailto:zoharnon@gmail.com?subject=Joining%20the%20Arnon%20Lab"
     style="color: #e0f4ec; text-decoration: none; font-weight: 500;">
    We're hiring!
  </a>
  <button onclick="document.getElementById('hiring-banner').style.display='none'; event.stopPropagation();"
    style="
      background: none; border: none; cursor: pointer;
      color: #7ab8a0; font-size: 1rem; line-height: 1;
      padding: 0 0 0 4px; margin: 0;
    " title="Dismiss" aria-label="Dismiss hiring banner">×</button>
</div>

<style>
@keyframes hiring-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(1.3); }
}
</style>
